<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phúc Tea · In Tem</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   TOKENS – copy exact từ Ops Center index.html
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
:root {
  --gold:     #F5A623;
  --gold-l:   #FDF3E3;
  --gold-m:   #F7C56E;
  --brown:    #3D2B1F;
  --brown-m:  #6B4226;
  --brown-l:  #9C6B47;
  --cream:    #FAF7F2;
  --white:    #fff;
  --red:      #E53E3E;
  --red-l:    #FFF5F5;
  --green:    #2D8248;
  --green-l:  #F0FFF4;
  --blue:     #2B6CB0;
  --blue-l:   #EBF8FF;
  --gray:     #718096;
  --gray-l:   #F7F8FA;
  --border:   #E8E0D4;
  --sh:       0 2px 12px rgba(61,43,31,.08);
  --shm:      0 4px 24px rgba(61,43,31,.13);
  --r:        12px;
  --rs:       8px;
}

*{ margin:0; padding:0; box-sizing:border-box; }
html { scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:10px; }

html, body { height:100%; overflow:hidden; }

body {
  font-family: 'Be Vietnam Pro', sans-serif;
  background: var(--cream);
  color: var(--brown);
  font-size: 14px;
  display: flex;
  flex-direction: column;
}

/* ━━━━━━━━━━━━━━━━━━━━ NAV (clone từ Ops Center) ━━━━━━━━━━━━━━━━━━━━ */
.nav {
  background: var(--brown);
  border-bottom: 3px solid var(--gold);
  flex-shrink: 0;
  z-index: 50;
}
.nav-top {
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 8px;
}
.nbrand {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 0;
  flex-shrink: 0;
}
.nlogo {
  width: 28px; height: 28px;
  background: var(--gold);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  color: var(--brown);
  font-weight: 700;
}
.ntitle {
  font-size: 13px;
  font-weight: 700;
  color: #fff;
}
.ntitle span { color: var(--gold); }

.nright {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
}

/* Sync badge */
.sync-wrap {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px;
  color: rgba(255,255,255,.6);
  font-weight: 500;
}
.sync-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  flex-shrink: 0;
  animation: pulse 2s infinite;
}
@keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.35} }

/* Clock */
.clock-wrap {
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 6px;
  padding: 3px 9px;
  font-size: 11px;
  font-weight: 600;
  color: var(--gold-m);
  letter-spacing: .03em;
}

/* ━━━━━━━━━━━━━━━━━━━━ WORKSPACE ━━━━━━━━━━━━━━━━━━━━ */
.workspace {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  overflow: hidden;
  gap: 0;
}

/* ━━━━━━━━━━━━━━━━━━━━ COLUMN ━━━━━━━━━━━━━━━━━━━━ */
.col {
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  overflow: hidden;
  background: var(--cream);
}
.col:last-child { border-right: none; }

.col-head {
  padding: 12px 14px 10px;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  box-shadow: var(--sh);
}

.col-label {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 9px;
}
.col-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.col-left  .col-dot { background: var(--blue); }
.col-right .col-dot { background: var(--green); }

.col-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .09em;
  text-transform: uppercase;
}
.col-left  .col-title { color: var(--blue); }
.col-right .col-title { color: var(--green); }

.col-count {
  margin-left: auto;
  font-size: 11px;
  font-weight: 600;
  color: var(--gray);
  background: var(--gray-l);
  border: 1px solid var(--border);
  padding: 1px 7px;
  border-radius: 20px;
}

/* SEARCH */
.search-box { position: relative; }
.search-box input {
  width: 100%;
  background: var(--cream);
  border: 1.5px solid var(--border);
  border-radius: var(--rs);
  padding: 8px 12px 8px 32px;
  color: var(--brown);
  font-family: 'Be Vietnam Pro', sans-serif;
  font-size: 13px;
  font-weight: 500;
  outline: none;
  transition: border-color .15s, background .15s;
}
.search-box input::placeholder { color: var(--gray); }
.search-box input:focus {
  border-color: var(--gold);
  background: var(--white);
}
.search-icon {
  position: absolute;
  left: 9px; top: 50%; transform: translateY(-50%);
  color: var(--gray);
  pointer-events: none;
}

/* ━━━━━━━━━━━━━━━━━━━━ PRODUCT LIST ━━━━━━━━━━━━━━━━━━━━ */
.product-list {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.prod-btn {
  all: unset;
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 10px 12px;
  border-radius: var(--rs);
  border: 1.5px solid var(--border);
  cursor: pointer;
  transition: all .14s;
  background: var(--white);
  color: var(--brown);
  font-family: 'Be Vietnam Pro', sans-serif;
  font-size: 13.5px;
  font-weight: 600;
  width: 100%;
  line-height: 1.3;
  box-shadow: var(--sh);
}
.prod-btn:hover {
  border-color: var(--gold);
  background: var(--gold-l);
  box-shadow: var(--shm);
  transform: translateY(-1px);
}
.col-left  .prod-btn:hover { border-color: var(--blue); background: var(--blue-l); }
.col-right .prod-btn:hover { border-color: var(--green); background: var(--green-l); }

.prod-btn.sel-blue  { border-color: var(--blue);  background: var(--blue-l);  }
.prod-btn.sel-green { border-color: var(--green); background: var(--green-l); }

.prod-id {
  font-size: 10px;
  font-weight: 600;
  color: var(--gray);
  background: var(--gray-l);
  border: 1px solid var(--border);
  padding: 2px 6px;
  border-radius: 4px;
  flex-shrink: 0;
  letter-spacing: .02em;
}
.prod-btn.sel-blue  .prod-id { background: var(--blue-l);  color: var(--blue);  border-color: var(--blue); }
.prod-btn.sel-green .prod-id { background: var(--green-l); color: var(--green); border-color: var(--green); }

.state-msg {
  padding: 32px 16px;
  text-align: center;
  color: var(--gray);
  font-size: 13px;
}
.state-loading {
  color: var(--gray);
  font-size: 12px;
  font-weight: 500;
  animation: blink 1s infinite;
}
@keyframes blink{ 0%,100%{opacity:1} 50%{opacity:.3} }

/* ━━━━━━━━━━━━━━━━━━━━ OVERLAY + PANEL ━━━━━━━━━━━━━━━━━━━━ */
.overlay {
  position: fixed; inset: 0;
  background: rgba(61,43,31,.4);
  backdrop-filter: blur(3px);
  z-index: 200;
  display: none;
  align-items: flex-end;
  justify-content: center;
}
.overlay.open { display: flex; }

.panel {
  background: var(--white);
  border: 1px solid var(--border);
  border-bottom: none;
  border-radius: 18px 18px 0 0;
  width: 100%;
  max-width: 560px;
  padding: 6px 22px 26px;
  position: relative;
  box-shadow: 0 -8px 40px rgba(61,43,31,.15);
  animation: slideUp .2s cubic-bezier(.2,.8,.3,1);
}
@keyframes slideUp{ from{transform:translateY(50px);opacity:0} to{transform:none;opacity:1} }

.panel-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 10px auto 16px;
}

.panel-close {
  position: absolute;
  top: 18px; right: 18px;
  width: 28px; height: 28px;
  background: var(--gray-l);
  border: 1.5px solid var(--border);
  border-radius: 50%;
  color: var(--gray);
  font-size: 13px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .12s;
}
.panel-close:hover { color: var(--brown); border-color: var(--brown-l); background: var(--cream); }

/* Panel header */
.panel-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .09em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 5px;
  margin-bottom: 5px;
  border: 1.5px solid;
}
.tag-btp { background: var(--green-l); color: var(--green); border-color: rgba(45,130,72,.25); }
.tag-nlt { background: var(--blue-l);  color: var(--blue);  border-color: rgba(43,108,176,.25); }

.panel-name {
  font-size: 18px;
  font-weight: 700;
  color: var(--brown);
  line-height: 1.25;
  margin-bottom: 14px;
}

.divider {
  height: 1px;
  background: var(--border);
  margin: 12px 0;
}

/* FIELDS */
.fields {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}
.field-full { grid-column: 1/-1; }

.field label {
  display: block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .09em;
  text-transform: uppercase;
  color: var(--gray);
  margin-bottom: 5px;
}

.field input[type=datetime-local],
.field input[type=date] {
  all: unset;
  display: block;
  width: 100%;
  background: var(--cream);
  border: 1.5px solid var(--border);
  border-radius: var(--rs);
  padding: 8px 11px;
  font-family: 'Be Vietnam Pro', monospace;
  font-size: 12.5px;
  font-weight: 500;
  color: var(--brown);
  transition: border-color .14s, background .14s;
  cursor: text;
}
.field input:focus { border-color: var(--gold); background: var(--white); outline: none; }

/* E field – read-only display */
.e-display {
  background: var(--gold-l);
  border: 1.5px solid rgba(245,166,35,.4);
  border-radius: var(--rs);
  padding: 8px 11px;
  font-size: 12.5px;
  font-weight: 700;
  color: var(--brown-m);
}

/* QTY */
.qty-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}
.qty-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .09em;
  text-transform: uppercase;
  color: var(--gray);
}
.qty-ctrl {
  display: flex;
  align-items: center;
  gap: 0;
  background: var(--cream);
  border: 1.5px solid var(--border);
  border-radius: var(--rs);
  overflow: hidden;
}
.qty-btn {
  width: 34px; height: 34px;
  background: transparent;
  border: none;
  color: var(--brown-m);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .1s;
}
.qty-btn:hover { background: var(--gold-l); color: var(--brown); }
.qty-num {
  font-size: 16px;
  font-weight: 700;
  min-width: 36px;
  text-align: center;
  color: var(--brown);
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
  line-height: 34px;
}

/* PRINT BUTTON */
.btn-print {
  all: unset;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  background: var(--gold);
  color: var(--brown);
  border-radius: var(--rs);
  padding: 13px;
  font-family: 'Be Vietnam Pro', sans-serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: .04em;
  cursor: pointer;
  transition: all .14s;
  box-shadow: 0 2px 8px rgba(245,166,35,.35);
}
.btn-print:hover { background: var(--gold-m); box-shadow: 0 4px 16px rgba(245,166,35,.45); transform: translateY(-1px); }
.btn-print:active { transform: none; box-shadow: none; }

/* TOAST */
.toast {
  position: fixed;
  bottom: 22px; right: 22px;
  padding: 11px 16px;
  border-radius: var(--r);
  font-size: 13px;
  font-weight: 600;
  z-index: 9100;
  background: var(--green);
  color: #fff;
  box-shadow: var(--shm);
  display: none;
  animation: fadeUp .25s ease;
}
.toast.err { background: var(--red); }
@keyframes fadeUp{ from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }

/* ━━━━━━━━━━━━━━━━━━━━ PRINT ━━━━━━━━━━━━━━━━━━━━ */
#print-area { display: none; }

@media print {
  body > *:not(#print-area) { display: none !important; }
  #print-area { display: block !important; }

  @page {
    size: 50mm 30mm;
    margin: 0;
  }

  .tem {
    width: 50mm;
    height: 30mm;
    padding: 2.5mm 3mm 2mm;
    page-break-after: always;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    font-family: 'Arial Narrow', Arial, sans-serif;
    overflow: hidden;
  }
  .tem:last-child { page-break-after: avoid; }

  .tem-name {
    font-size: 8pt;
    font-weight: 900;
    line-height: 1.1;
    text-transform: uppercase;
    letter-spacing: .02em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tem-rows {
    font-size: 7pt;
    font-family: 'Courier New', monospace;
    line-height: 1.65;
  }
  .tem-row { display: flex; gap: 2mm; }
  .tem-lbl { font-weight: 700; min-width: 5mm; }
  .tem-nv {
    font-size: 6.5pt;
    border-top: 0.3mm solid #555;
    padding-top: 1mm;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .tem-nv-line {
    border-bottom: 0.3mm solid #000;
    min-width: 30mm;
  }
}
</style>
</head>
<body>

<!-- NAV – clone structure từ Ops Center -->
<nav class="nav">
  <div class="nav-top">
    <div class="nbrand">
      <div class="nlogo">P</div>
      <div class="ntitle">Phúc Tea &nbsp;<span>· In Tem</span></div>
    </div>
    <div class="nright">
      <div class="sync-wrap">
        <div class="sync-dot" id="sync-dot"></div>
        <span id="sync-label">Đang tải...</span>
      </div>
      <div class="clock-wrap" id="clock">--:-- --/--/--</div>
    </div>
  </div>
</nav>

<!-- WORKSPACE -->
<div class="workspace">

  <!-- LEFT: NGUYÊN LIỆU THÔ -->
  <div class="col col-left">
    <div class="col-head">
      <div class="col-label">
        <div class="col-dot"></div>
        <span class="col-title">Nguyên liệu thô</span>
        <span class="col-count" id="count-nlt">0</span>
      </div>
      <div class="search-box">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search-nlt" placeholder="Tìm nguyên liệu..." autocomplete="off">
      </div>
    </div>
    <div class="product-list" id="list-nlt">
      <div class="state-loading state-msg">Đang kết nối...</div>
    </div>
  </div>

  <!-- RIGHT: BÁN THÀNH PHẨM -->
  <div class="col col-right">
    <div class="col-head">
      <div class="col-label">
        <div class="col-dot"></div>
        <span class="col-title">Bán thành phẩm</span>
        <span class="col-count" id="count-btp">0</span>
      </div>
      <div class="search-box">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search-btp" placeholder="Tìm bán thành phẩm..." autocomplete="off">
      </div>
    </div>
    <div class="product-list" id="list-btp">
      <div class="state-loading state-msg">Đang kết nối...</div>
    </div>
  </div>

</div>

<!-- PANEL OVERLAY -->
<div class="overlay" id="overlay">
  <div class="panel" id="panel">
    <div class="panel-handle"></div>
    <button class="panel-close" id="btn-close">✕</button>

    <div class="panel-tag" id="p-tag">—</div>
    <div class="panel-name" id="p-name">—</div>

    <!-- BTP FIELDS -->
    <div id="fields-btp">
      <div class="fields">
        <div class="field">
          <label>D — Thời điểm làm</label>
          <input type="datetime-local" id="d-btp">
        </div>
        <div class="field">
          <label>U — Đạt chuẩn lúc</label>
          <input type="datetime-local" id="u-btp">
        </div>
        <div class="field field-full">
          <label>E — Hạn sử dụng (tự tính)</label>
          <div class="e-display" id="e-btp">—</div>
        </div>
      </div>
    </div>

    <!-- NLT FIELDS -->
    <div id="fields-nlt" style="display:none">
      <div class="fields">
        <div class="field field-full">
          <label>D — HSD bao bì</label>
          <input type="date" id="d-nlt">
        </div>
        <div class="field">
          <label>U — Thời điểm mở</label>
          <input type="datetime-local" id="u-nlt">
        </div>
        <div class="field">
          <label>E — Hạn sử dụng (tự tính)</label>
          <div class="e-display" id="e-nlt">—</div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="qty-row">
      <span class="qty-label">Số tem</span>
      <div class="qty-ctrl">
        <button class="qty-btn" id="qty-minus">−</button>
        <div class="qty-num" id="qty-display">1</div>
        <button class="qty-btn" id="qty-plus">+</button>
      </div>
    </div>

    <button class="btn-print" id="btn-print">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      IN TEM
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>
<div id="print-area"></div>

<script>
// ══════════════════════════════════════════════════════
// ⚙️  CONFIG – Paste Apps Script Web App URL vào đây
// ══════════════════════════════════════════════════════
const APPS_SCRIPT_URL = 'https://script.google.com/a/macros/phuctea.com.vn/s/AKfycbwwumAWunhznaB8W-patny3Ot_eb7uLYaO7R3VwvVZegq4qavXRtneRZ7DXuiEbEh2U/exec';

// ── SAMPLE DATA ──
const SAMPLE = [
  {id:'TS01',name:'Trà sữa truyền thống',type:'BanThanhPham',u_hours:5,e_hours:12,hsd_bao_bi:0,hsd_sau_mo:0},
  {id:'TS02',name:'Trà sữa matcha',type:'BanThanhPham',u_hours:5,e_hours:12,hsd_bao_bi:0,hsd_sau_mo:0},
  {id:'TS03',name:'Hồng trà sữa',type:'BanThanhPham',u_hours:4,e_hours:10,hsd_bao_bi:0,hsd_sau_mo:0},
  {id:'TS04',name:'Bạc xỉu',type:'BanThanhPham',u_hours:3,e_hours:8,hsd_bao_bi:0,hsd_sau_mo:0},
  {id:'TS05',name:'Trà đào cam sả',type:'BanThanhPham',u_hours:4,e_hours:10,hsd_bao_bi:0,hsd_sau_mo:0},
  {id:'NL01',name:'Trân châu đen',type:'NguyenLieuTho',u_hours:0,e_hours:0,hsd_bao_bi:180,hsd_sau_mo:3},
  {id:'NL02',name:'Trân châu trắng',type:'NguyenLieuTho',u_hours:0,e_hours:0,hsd_bao_bi:180,hsd_sau_mo:3},
  {id:'NL03',name:'Sữa đặc',type:'NguyenLieuTho',u_hours:0,e_hours:0,hsd_bao_bi:365,hsd_sau_mo:14},
  {id:'NL04',name:'Siro đường',type:'NguyenLieuTho',u_hours:0,e_hours:0,hsd_bao_bi:180,hsd_sau_mo:30},
];

// ── STATE ──
let products = [], current = null, qty = 1;

// ── CLOCK ──
const $clock = document.getElementById('clock');
function tick(){
  const n=new Date();
  $clock.textContent=`${p2(n.getHours())}:${p2(n.getMinutes())} ${p2(n.getDate())}/${p2(n.getMonth()+1)}/${String(n.getFullYear()).slice(2)}`;
}
setInterval(tick,1000); tick();

// ── UTILS ──
function p2(n){ return String(n).padStart(2,'0'); }
function fmt(d){ return `${p2(d.getDate())}/${p2(d.getMonth()+1)}/${String(d.getFullYear()).slice(2)} ${p2(d.getHours())}:${p2(d.getMinutes())}`; }
function fmtDate(d){ return `${p2(d.getDate())}/${p2(d.getMonth()+1)}/${String(d.getFullYear()).slice(2)}`; }
function toInputDT(d){ return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}T${p2(d.getHours())}:${p2(d.getMinutes())}`; }
function toInputDate(d){ return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`; }
function parseDT(s){ return s?new Date(s):null; }
function parseD(s){ return s?new Date(s+'T00:00:00'):null; }
function addH(d,h){ return new Date(d.getTime()+h*3600000); }
function addD(d,n){ return new Date(d.getTime()+n*86400000); }

function showToast(msg, isErr=false){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast'+(isErr?' err':'');
  t.style.display='block';
  setTimeout(()=>t.style.display='none',3000);
}

// ── LOAD DATA ──
async function loadData(){
  const dot=document.getElementById('sync-dot');
  const lbl=document.getElementById('sync-label');

  if(APPS_SCRIPT_URL==='YOUR_APPS_SCRIPT_URL_HERE'){
    products=SAMPLE;
    dot.style.background='#F5A623';
    lbl.textContent='Sample data';
    render(); return;
  }

  lbl.textContent='Đang tải...';
  dot.style.background='#F5A623';
  try{
    const res=await fetch(APPS_SCRIPT_URL);
    const json=await res.json();
    if(json.error) throw new Error(json.error);
    products=json.products||[];
    dot.style.background='#2D8248';
    lbl.textContent=`${products.length} sản phẩm · Đã đồng bộ`;
    render();
  }catch(err){
    dot.style.background='#E53E3E';
    lbl.textContent='Lỗi kết nối!';
    products=SAMPLE; render();
    showToast('Không tải được dữ liệu, đang dùng sample data.', true);
  }
}

// ── RENDER ──
function render(qNlt='',qBtp=''){
  const nlt=products.filter(p=>p.type==='NguyenLieuTho'&&p.name.toLowerCase().includes(qNlt.toLowerCase()));
  const btp=products.filter(p=>p.type==='BanThanhPham' &&p.name.toLowerCase().includes(qBtp.toLowerCase()));
  document.getElementById('count-nlt').textContent=nlt.length;
  document.getElementById('count-btp').textContent=btp.length;
  renderList('list-nlt',nlt);
  renderList('list-btp',btp);
}

function renderList(id,list){
  const el=document.getElementById(id);
  if(!list.length){ el.innerHTML='<div class="state-msg">Không tìm thấy</div>'; return; }
  el.innerHTML=list.map(p=>`
    <button class="prod-btn" data-id="${p.id}" onclick="selectProduct('${p.id}')">
      <span class="prod-id">${p.id}</span>${p.name}
    </button>
  `).join('');
}

// ── SELECT ──
function selectProduct(id){
  const p=products.find(x=>x.id===id); if(!p) return;
  current=p; qty=1;
  document.querySelectorAll('.prod-btn').forEach(b=>b.classList.remove('sel-blue','sel-green'));
  const btn=document.querySelector(`.prod-btn[data-id="${id}"]`);
  if(btn) btn.classList.add(p.type==='NguyenLieuTho'?'sel-blue':'sel-green');

  document.getElementById('p-name').textContent=p.name;
  const tag=document.getElementById('p-tag');
  const now=new Date();

  if(p.type==='BanThanhPham'){
    tag.textContent='🟢 Bán thành phẩm';
    tag.className='panel-tag tag-btp';
    document.getElementById('fields-btp').style.display='';
    document.getElementById('fields-nlt').style.display='none';
    document.getElementById('d-btp').value=toInputDT(now);
    document.getElementById('u-btp').value=toInputDT(addH(now,p.u_hours));
    calcE_BTP();
    document.getElementById('d-btp').oninput=()=>{
      const d=parseDT(document.getElementById('d-btp').value);
      if(d) document.getElementById('u-btp').value=toInputDT(addH(d,p.u_hours));
      calcE_BTP();
    };
  } else {
    tag.textContent='🔵 Nguyên liệu thô';
    tag.className='panel-tag tag-nlt';
    document.getElementById('fields-btp').style.display='none';
    document.getElementById('fields-nlt').style.display='';
    document.getElementById('d-nlt').value=toInputDate(addD(now,p.hsd_bao_bi));
    document.getElementById('u-nlt').value=toInputDT(now);
    calcE_NLT();
    document.getElementById('d-nlt').oninput=calcE_NLT;
    document.getElementById('u-nlt').oninput=calcE_NLT;
  }

  document.getElementById('qty-display').textContent=1;
  document.getElementById('overlay').classList.add('open');
}

// ── CALC ──
function calcE_BTP(){
  const p=current; if(!p) return;
  const d=parseDT(document.getElementById('d-btp').value);
  document.getElementById('e-btp').textContent=d?fmt(addH(d,p.e_hours)):'—';
}
function calcE_NLT(){
  const p=current; if(!p) return;
  const d=parseD(document.getElementById('d-nlt').value);
  const u=parseDT(document.getElementById('u-nlt').value);
  if(!d||!u){document.getElementById('e-nlt').textContent='—';return;}
  const e=new Date(Math.min(d.getTime(),addD(u,p.hsd_sau_mo).getTime()));
  document.getElementById('e-nlt').textContent=fmt(e);
}

// ── QTY ──
document.getElementById('qty-minus').onclick=()=>{if(qty>1){qty--;document.getElementById('qty-display').textContent=qty;}};
document.getElementById('qty-plus').onclick=()=>{qty++;document.getElementById('qty-display').textContent=qty;};

// ── CLOSE ──
function closePanel(){
  document.getElementById('overlay').classList.remove('open');
  document.querySelectorAll('.prod-btn').forEach(b=>b.classList.remove('sel-blue','sel-green'));
  current=null;
}
document.getElementById('btn-close').onclick=closePanel;
document.getElementById('overlay').onclick=e=>{if(e.target===document.getElementById('overlay'))closePanel();};

// ── PRINT ──
document.getElementById('btn-print').onclick=()=>{
  const p=current; if(!p) return;
  let dTxt,uTxt,eTxt;
  if(p.type==='BanThanhPham'){
    const d=parseDT(document.getElementById('d-btp').value);
    const u=parseDT(document.getElementById('u-btp').value);
    dTxt=d?fmt(d):'—'; uTxt=u?fmt(u):'—'; eTxt=d?fmt(addH(d,p.e_hours)):'—';
  } else {
    const d=parseD(document.getElementById('d-nlt').value);
    const u=parseDT(document.getElementById('u-nlt').value);
    dTxt=d?fmtDate(d):'—'; uTxt=u?fmt(u):'—';
    const e=d&&u?new Date(Math.min(d.getTime(),addD(u,p.hsd_sau_mo).getTime())):null;
    eTxt=e?fmt(e):'—';
  }
  const tem=`<div class="tem">
    <div class="tem-name">${p.name}</div>
    <div class="tem-rows">
      <div class="tem-row"><span class="tem-lbl">D:</span><span>${dTxt}</span></div>
      <div class="tem-row"><span class="tem-lbl">U:</span><span>${uTxt}</span></div>
      <div class="tem-row"><span class="tem-lbl">E:</span><span>${eTxt}</span></div>
    </div>
    <div class="tem-nv"><span>NV:</span><span class="tem-nv-line">&nbsp;</span></div>
  </div>`;
  document.getElementById('print-area').innerHTML=Array(qty).fill(tem).join('');
  setTimeout(()=>{window.print();document.getElementById('print-area').innerHTML='';},80);
};

// ── SEARCH ──
document.getElementById('search-nlt').addEventListener('input',e=>render(e.target.value,document.getElementById('search-btp').value));
document.getElementById('search-btp').addEventListener('input',e=>render(document.getElementById('search-nlt').value,e.target.value));

// ── INIT ──
loadData();
</script>
</body>
</html>
